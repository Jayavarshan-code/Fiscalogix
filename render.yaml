services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: fiscalogix-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free                        # upgrade to 'starter' ($7/mo) for always-on
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: fiscalogix-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: fiscalogix-redis
          type: redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false                   # set manually in Render dashboard (never commit)
      - key: JWT_SECRET_KEY
        sync: false                   # set manually in Render dashboard
      - key: LLM_MODEL
        value: claude-opus-4-6
      - key: ALLOWED_ORIGINS
        value: https://fiscalogix.vercel.app,https://fiscalogix-backend.onrender.com
      - key: PYTHONUNBUFFERED
        value: "1"

  # ── Celery Worker ────────────────────────────────────────────────────────────
  - type: worker
    name: fiscalogix-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fiscalogix-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: fiscalogix-redis
          type: redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false

  # ── Redis ────────────────────────────────────────────────────────────────────
  - type: redis
    name: fiscalogix-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

# ── Postgres ─────────────────────────────────────────────────────────────────
databases:
  - name: fiscalogix-db
    databaseName: fiscalogix
    user: fiscalogix_admin
    plan: free                        # 1GB storage, upgrade when needed
