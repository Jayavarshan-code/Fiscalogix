services:
  - type: web
    name: fiscalogix-backend
    env: python
    # Ensure build context is set to the backend directory if necessary
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fiscalogix-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: APP_ENV
        value: production

databases:
  - name: fiscalogix-db
    databaseName: fiscalogix
    user: fiscalogix_admin
    plan: free # Change to 'standard' for production scale
