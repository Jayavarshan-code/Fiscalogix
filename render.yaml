services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: fiscalogix-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter                       # 'free' spins down after inactivity; starter ($7/mo) is always-on
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: fiscalogix-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: fiscalogix-redis
          type: redis
          property: connectionString

      # ── LLM (required) ──────────────────────────────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false                     # set manually in Render dashboard — never commit
      - key: LLM_MODEL
        value: claude-sonnet-4-6        # cost-effective for production; upgrade to claude-opus-4-6 for demos

      # ── Auth (required) ─────────────────────────────────────────────────────
      - key: JWT_SECRET_KEY
        sync: false                     # set manually in Render dashboard

      # ── CORS ────────────────────────────────────────────────────────────────
      - key: ALLOWED_ORIGINS
        value: https://fiscalogix.vercel.app,https://fiscalogix-frontend.onrender.com,https://fiscalogix-backend.onrender.com

      # ── Email Alerts (optional — leave blank to disable) ────────────────────
      - key: SMTP_HOST
        sync: false                     # e.g. smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false                     # e.g. alerts@yourcompany.com
      - key: SMTP_PASS
        sync: false                     # Gmail App Password (not account password)
      - key: ALERT_EMAIL
        sync: false                     # recipient: cfo@yourcompany.com

      # ── WhatsApp Alerts via Twilio (optional — leave blank to disable) ───────
      - key: TWILIO_ACCOUNT_SID
        sync: false                     # ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false                     # whatsapp:+14155238886  (Twilio sandbox number)
      - key: ALERT_WHATSAPP_TO
        sync: false                     # whatsapp:+919876543210 (recipient)

      # ── FX Rate API (optional — falls back to hardcoded 84.5) ───────────────
      - key: FX_API_KEY
        sync: false                     # exchangerate-api.com or similar

      - key: PYTHONUNBUFFERED
        value: "1"

  # ── Celery Worker ────────────────────────────────────────────────────────────
  - type: worker
    name: fiscalogix-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fiscalogix-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: fiscalogix-redis
          type: redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ALERT_EMAIL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: ALERT_WHATSAPP_TO
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"

  # ── Redis ────────────────────────────────────────────────────────────────────
  - type: redis
    name: fiscalogix-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

# ── Postgres ─────────────────────────────────────────────────────────────────
databases:
  - name: fiscalogix-db
    databaseName: fiscalogix
    user: fiscalogix_admin
    plan: free                          # 1GB storage; upgrade to 'starter' ($7/mo) when data grows
